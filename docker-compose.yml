services:
  api:
    build: .
    container_name: agent-dashboard-api
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      # Single key (backward compat): API_KEY=your-secret-key
      - API_KEY=${API_KEY:-}
      # Multiple keys (one per agent): API_KEYS=lyra-key,hex-key,nova-key
      - API_KEYS=${API_KEYS:-}
    volumes:
      - quest-data:/app/data

volumes:
  quest-data:
