services:
  api:
    build: .
    container_name: agent-dashboard-api
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - API_KEY=${API_KEY:-YOUR_API_KEY_HERE}
    volumes:
      - quest-data:/app/public/data

volumes:
  quest-data:
